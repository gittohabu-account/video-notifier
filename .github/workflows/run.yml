name: Video Notifier

# 毎日 日本時間 16:17 と 22:23 の2回 自動実行 + 手動実行も可能
# GitHub Actions の cron は UTC 基準（JST = UTC + 9）
# 「分=00」のキリ番時刻は GitHub Actions が高負荷で大幅遅延するため
# 意図的に半端な分を指定。2回スケジュールすることで片方が失敗(403等)しても
# もう片方でリカバリできる（seen_urls で重複通知は防がれる）。
on:
  schedule:
    - cron: '17 7 * * *'    # UTC 07:17 = JST 16:17 メイン
    - cron: '23 13 * * *'   # UTC 13:23 = JST 22:23 保険
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # seen_urls.json / seen_thumbs.json をリポジトリにコミットするため

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run video notifier
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python video_notifier.py

      - name: Commit seen state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_urls.json seen_thumbs.json 2>/dev/null || true
          if ! git diff --quiet --cached; then
            git commit -m "Update seen state [skip ci]"
            git push
          else
            echo "No changes to seen state."
          fi
